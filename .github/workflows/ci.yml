name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-action/toolchain@v1
        with:
          toolchain: nightly
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-action/toolchain@v1
        with:
          toolchain: nightly

      - uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --workspace

  build-macos:
    name: Build macOS App
    needs: [lint, test]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-action/toolchain@v1
        with:
          toolchain: nightly

      - uses: Swatinem/rust-cache@v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install frontend dependencies
        working-directory: elo-tauri
        run: pnpm install

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build macOS app
        working-directory: elo-tauri
        run: cargo tauri build --bundles app,dmg

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-app
          path: |
            target/release/bundle/macos/Elo.app
            target/release/bundle/dmg/*.dmg

  build-linux:
    name: Build Linux Packages
    needs: [lint, test]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-action/toolchain@v1
        with:
          toolchain: nightly

      - uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install frontend dependencies
        working-directory: elo-tauri
        run: pnpm install

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build Linux packages
        working-directory: elo-tauri
        run: cargo tauri build --bundles deb,appimage,rpm

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: |
            target/release/bundle/deb/*.deb
            target/release/bundle/appimage/*.AppImage
            target/release/bundle/rpm/*.rpm

  release:
    name: Publish Release
    needs: [build-macos, build-linux]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release assets
        run: |
          mkdir -p release-assets
          # macOS
          cd artifacts/macos-app
          if [ -d "target/release/bundle/macos/Elo.app" ]; then
            (cd target/release/bundle/macos && zip -r ../../../../../release-assets/Elo-macos.app.zip Elo.app)
          fi
          cp target/release/bundle/dmg/*.dmg ../../release-assets/ 2>/dev/null || true
          cd ../..
          # Linux
          cp artifacts/linux-packages/target/release/bundle/deb/*.deb release-assets/ 2>/dev/null || true
          cp artifacts/linux-packages/target/release/bundle/appimage/*.AppImage release-assets/ 2>/dev/null || true
          cp artifacts/linux-packages/target/release/bundle/rpm/*.rpm release-assets/ 2>/dev/null || true
          ls -la release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-assets/*
