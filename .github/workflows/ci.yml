name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libglib2.0-dev \
            libgdk-pixbuf-2.0-dev \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libglib2.0-dev \
            libgdk-pixbuf-2.0-dev \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly

      - uses: Swatinem/rust-cache@v2

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          # Pinned: pnpm 10+ rejects ignored build scripts (esbuild postinstall).
          # Settings location for the allowlist has shifted between 10 and 11
          # (package.json "pnpm" field deprecated, pnpm-workspace.yaml not
          # honored in our layout). Stay on 9 until that stabilizes.
          version: 9

      - name: Install frontend deps
        working-directory: elo-tauri
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: cargo test --workspace

  build-macos:
    name: Build macOS App
    needs: [lint, test]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          # Pinned: pnpm 10+ rejects ignored build scripts (esbuild postinstall).
          # Settings location for the allowlist has shifted between 10 and 11
          # (package.json "pnpm" field deprecated, pnpm-workspace.yaml not
          # honored in our layout). Stay on 9 until that stabilizes.
          version: 9

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build macOS app
        run: make build-macos

      - name: Upload macOS artifacts
        # The .dmg is a single opaque disk image, so upload-artifact's lack of
        # permission preservation can't strip the executable bit from the app
        # inside it (unlike a raw .app tree).
        uses: actions/upload-artifact@v7
        with:
          name: macos-app
          path: build/*.dmg

  build-linux:
    name: Build Linux Packages
    needs: [lint, test]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly

      - uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libglib2.0-dev \
            libgdk-pixbuf-2.0-dev \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          # Pinned: pnpm 10+ rejects ignored build scripts (esbuild postinstall).
          # Settings location for the allowlist has shifted between 10 and 11
          # (package.json "pnpm" field deprecated, pnpm-workspace.yaml not
          # honored in our layout). Stay on 9 until that stabilizes.
          version: 9

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build Linux packages
        run: make build-linux

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v7
        with:
          name: linux-packages
          path: build/*

  release:
    name: Publish Release
    needs: [build-macos, build-linux]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Collect release assets
        run: |
          mkdir -p release-assets
          # macOS — ship the universal .dmg. Homebrew casks mount it natively.
          cp artifacts/macos-app/*.dmg release-assets/
          # Linux
          cp artifacts/linux-packages/*.deb release-assets/ 2>/dev/null || true
          cp artifacts/linux-packages/*.AppImage release-assets/ 2>/dev/null || true
          cp artifacts/linux-packages/*.rpm release-assets/ 2>/dev/null || true
          ls -la release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: release-assets/*
